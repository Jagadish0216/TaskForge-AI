# Server configuration
server.port=8080
server.servlet.context-path=/api/v1

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/taskforge_db?useSSL=false&serverTimezone=UTC

spring.datasource.username=root

spring.datasource.password=Jagadish123&
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# SpringDoc OpenAPI Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.taskforge=DEBUG

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
gemini.models=${GEMINI_MODELS:gemini-3.5-flash,gemini-3.5-flash-lite,gemini-3.5-nano}
gemini.retry.maxAttempts=3
gemini.retry.initialDelay=1000
gemini.connect.timeout=15000
gemini.read.timeout=60000

